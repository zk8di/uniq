<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uniqlo — Список покупок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#007bff;--accent-soft:rgba(0,123,255,.15);
  --bg:#f4f6f9;--surface:rgba(255,255,255,.72);
  --text:#1a1d23;--muted:#6b7280;--border:rgba(255,255,255,.6);
  --shadow:0 8px 32px rgba(0,0,0,.08);--radius:16px;
  --grad:linear-gradient(135deg,#e8f0fe 0%,#f4f6f9 50%,#eef2f7 100%);
}
[data-theme=dark]{
  --bg:#0f1419;--surface:rgba(30,36,48,.75);
  --text:#f0f2f5;--muted:#9ca3af;--border:rgba(255,255,255,.08);
  --shadow:0 8px 32px rgba(0,0,0,.35);--accent-soft:rgba(0,123,255,.25);
  --grad:linear-gradient(135deg,#0f1419 0%,#151b26 50%,#1a2233 100%);
}
html{scroll-behavior:smooth}
body{
  font-family:Inter,system-ui,-apple-system,sans-serif;
  background:var(--grad);color:var(--text);min-height:100dvh;
  display:flex;flex-direction:column;line-height:1.5;
  transition:background .4s,color .4s;
}

/* Header */
header{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;
  background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);box-shadow:var(--shadow);
}
.logo{
  font-size:clamp(1.75rem,5vw,2.5rem);font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--accent),#0056b3);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tagline{font-size:.85rem;color:var(--muted);font-weight:400}
.theme-btn{
  width:42px;height:42px;border:none;border-radius:50%;cursor:pointer;
  background:var(--accent-soft);color:var(--text);font-size:1.1rem;
  display:grid;place-items:center;transition:transform .25s,background .25s;
}
.theme-btn:hover{transform:scale(1.08);background:var(--accent);color:#fff}

/* Main */
main{flex:1;padding:1.5rem;max-width:1100px;width:100%;margin:0 auto}
.intro{text-align:center;margin-bottom:1.75rem}
.intro h2{font-size:1.1rem;font-weight:600;margin-bottom:.35rem}
.intro p{color:var(--muted);font-size:.9rem}

.collage{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:1rem;
}
@media(min-width:640px){.collage{grid-template-columns:repeat(3,1fr);gap:1.25rem}}
@media(min-width:900px){.collage{grid-template-columns:repeat(4,1fr)}}

.item{
  position:relative;border:none;padding:0;cursor:pointer;text-align:left;
  border-radius:var(--radius);overflow:hidden;
  background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:var(--shadow);border:1px solid var(--border);
  transition:transform .3s,box-shadow .3s,opacity .3s;
  animation:fadeUp .5s ease both;
  animation-delay:calc(var(--i,0)*.05s);
}
.item:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,123,255,.15)}
.item:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.item img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;transition:filter .35s}
.item-info{padding:.75rem .85rem 1rem}
.item-info h3{font-size:.85rem;font-weight:600;margin-bottom:.15rem}
.item-info span{font-size:.75rem;color:var(--muted)}
.check{
  position:absolute;top:.6rem;right:.6rem;width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.85);backdrop-filter:blur(8px);
  display:grid;place-items:center;font-size:.75rem;
  opacity:0;transform:scale(.6);transition:opacity .3s,transform .3s,background .3s;
  border:2px solid transparent;
}
.item.bought img{filter:brightness(.55) saturate(.6)}
.item.bought{opacity:.85}
.item.bought .check{
  opacity:1;transform:scale(1);
  background:var(--accent);color:#fff;border-color:var(--accent);
}

/* Footer */
footer{
  position:sticky;bottom:0;
  padding:1rem 1.5rem;
  background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);box-shadow:0 -4px 24px rgba(0,0,0,.06);
}
.footer-inner{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.counter{display:flex;align-items:baseline;gap:.5rem}
.counter-num{
  font-size:clamp(1.75rem,4vw,2.25rem);font-weight:800;color:var(--accent);
  transition:transform .3s;
}
.counter-num.pop{animation:pop .35s ease}
.counter-label{font-size:.9rem;color:var(--muted)}
.progress-wrap{flex:1;min-width:120px;max-width:280px}
.progress-bar{
  height:6px;border-radius:99px;background:var(--accent-soft);overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#339dff);
  width:0;transition:width .5s cubic-bezier(.4,0,.2,1);
}
.done-msg{font-size:.85rem;color:var(--muted);transition:opacity .3s}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">Uniqlo</div>
    <div class="tagline">LifeWear · список покупок</div>
  </div>
  <button class="theme-btn" id="themeBtn" aria-label="Переключить тему">🌙</button>
</header>

<main>
  <div class="intro">
    <h2>Что берём сегодня? 👕</h2>
    <p>Нажми на карточку, чтобы отметить покупку</p>
  </div>
  <div class="collage" id="collage"></div>
</main>

<footer>
  <div class="footer-inner">
    <div class="counter">
      <span class="counter-num" id="count">0</span>
      <span class="counter-label">из <span id="total">0</span> куплено</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>
    <div class="done-msg" id="msg">Ещё есть, что добавить в корзину ✨</div>
  </div>
</footer>

<script>
const IMG_BASE='https://raw.githubusercontent.com/zk8di/uniq/main';
const items=Array.from({length:18},(_,i)=>({
  name:`Позиция ${i+1}`,
  img:`${IMG_BASE}/${i+1}.jpg`
}));
const KEY='uniqlo-bought-v2';
let bought=JSON.parse(localStorage.getItem(KEY)||'[]');
const collage=document.getElementById('collage');
const countEl=document.getElementById('count');
const totalEl=document.getElementById('total');
const progressEl=document.getElementById('progress');
const msgEl=document.getElementById('msg');
totalEl.textContent=items.length;

items.forEach((it,i)=>{
  const btn=document.createElement('button');
  btn.className='item'+(bought.includes(i)?' bought':'');
  btn.style.setProperty('--i',i);
  btn.innerHTML=`<img src="${it.img}" alt="${it.name}" loading="lazy" width="400" height="533"><span class="check">✓</span><div class="item-info"><h3>${it.name}</h3></div>`;
  btn.addEventListener('click',()=>{
    btn.classList.toggle('bought');
    const idx=bought.indexOf(i);
    if(idx>-1)bought.splice(idx,1);else bought.push(i);
    localStorage.setItem(KEY,JSON.stringify(bought));
    updateCounter(true);
  });
  collage.appendChild(btn);
});

function updateCounter(animate){
  const n=bought.length;
  countEl.textContent=n;
  progressEl.style.width=(n/items.length*100)+'%';
  if(animate){countEl.classList.remove('pop');void countEl.offsetWidth;countEl.classList.add('pop')}
  msgEl.textContent=n===0?'Ещё есть, что добавить в корзину ✨'
    :n===items.length?'Всё куплено! Отличный шопинг 🎉'
    :`Осталось ${items.length-n} — почти готово 💪`;
}
updateCounter(false);

const themeBtn=document.getElementById('themeBtn');
const saved=localStorage.getItem('uniqlo-theme');
if(saved)document.documentElement.setAttribute('data-theme',saved);
themeBtn.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';
themeBtn.addEventListener('click',()=>{
  const dark=document.documentElement.getAttribute('data-theme')!=='dark';
  document.documentElement.setAttribute('data-theme',dark?'dark':'');
  if(!dark)document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('uniqlo-theme',dark?'dark':'');
  themeBtn.textContent=dark?'☀️':'🌙';
});
if(!saved&&matchMedia('(prefers-color-scheme:dark)').matches){
  document.documentElement.setAttribute('data-theme','dark');
  themeBtn.textContent='☀️';
}
</script>
</body>
</html>
